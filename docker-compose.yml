services:
  # ── Microservices ──────────────────────────────────
  auth-service:
    build: .
    command: ./auth-service
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9001 || exit 1" ]
      interval: 3s
      retries: 10

  canvas-service:
    build: .
    command: ./canvas-service
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9002 || exit 1" ]
      interval: 3s

  api-gateway:
    build: .
    command: ./api-gateway
    ports:
      - "3000:3000"
    depends_on:
      auth-service: { condition: service_healthy }
      canvas-service: { condition: service_healthy }
  # ── Infrastructure ──────────────────────────────────────
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_USER: pixelwar
      POSTGRES_PASSWORD: pixelwar
      POSTGRES_DB: pixelwar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelwar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: public.ecr.aws/docker/library/nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"  # monitoring
    command: "--jetstream --store_dir /data -m 8222"
    volumes:
      - natsdata:/data
  # ── Management UI ───────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pixelwar.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_DIR_DATA: '/tmp/pgadmin_data'
    ports:
      - "5050:80"
    volumes:
      - ./config/pgadmin_servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres

  redis-insight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
  # ── Observability ───────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.50.0
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  natsdata:
  grafanadata:
  redisinsight_data: