syntax = "proto3";
package pixelwar.canvas;

service CanvasService {
  rpc ClaimParcel(ClaimParcelRequest) returns (ParcelReply);
  rpc GetParcel(GetParcelRequest) returns (ParcelReply);
  rpc UpdatePixels(UpdatePixelsRequest) returns (UpdatePixelsReply);
  rpc GetSnapshot(GetSnapshotRequest) returns (SnapshotReply);
  rpc CheckOverlap(CheckOverlapRequest) returns (CheckOverlapReply);
}

message ClaimParcelRequest {
  string user_id     = 1;
  string round_id    = 2;
  uint32 origin_x    = 3;
  uint32 origin_y    = 4;
  uint32 width       = 5;
  uint32 height      = 6;
  string description = 7;
}

message GetParcelRequest {
  string parcel_id = 1;
}

message ParcelReply {
  string parcel_id   = 1;
  string user_id     = 2;
  string round_id    = 3;
  uint32 origin_x    = 4;
  uint32 origin_y    = 5;
  uint32 width       = 6;
  uint32 height      = 7;
  string description = 8;
  string created_at  = 9;
}

message PixelUpdate {
  uint32 local_x = 1;
  uint32 local_y = 2;
  uint32 color   = 3;
}

message UpdatePixelsRequest {
  string parcel_id           = 1;
  string user_id             = 2;
  repeated PixelUpdate pixels = 3;
}

message UpdatePixelsReply {
  uint32 updated_count = 1;
}

message GetSnapshotRequest {
  uint32 x      = 1;
  uint32 y      = 2;
  uint32 width  = 3;
  uint32 height = 4;
}

message SnapshotReply {
  bytes  data   = 1;
  uint32 width  = 2;
  uint32 height = 3;
}

message CheckOverlapRequest {
  string round_id = 1;
  uint32 origin_x = 2;
  uint32 origin_y = 3;
  uint32 width    = 4;
  uint32 height   = 5;
}

message CheckOverlapReply {
  bool overlaps = 1;
}
