syntax = "proto3";
package pixelwar.auth;

service AuthService {
  rpc Register(RegisterRequest) returns (AuthReply);
  rpc Login(LoginRequest) returns (AuthReply);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenReply);
  rpc GetUser(GetUserRequest) returns (UserReply);
}

message RegisterRequest {
  string username = 1;
  string email    = 2;
  string password = 3;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message AuthReply {
  string token    = 1;
  string user_id  = 2;
  string username = 3;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenReply {
  bool   valid    = 1;
  string user_id  = 2;
  string username = 3;
}

message GetUserRequest {
  string user_id = 1;
}

message UserReply {
  string user_id         = 1;
  string username        = 2;
  string email           = 3;
  bool   is_disqualified = 4;
  string last_draw_at    = 5;
}
